name: Dev Release

on:
  push:
    branches: [main, master]

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper JAR
        working-directory: sheaf
        run: gradle wrapper

      - name: Make gradlew executable
        run: chmod +x sheaf/gradlew

      - name: Build release APK
        working-directory: sheaf
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="$PWD/keystore.jks" \
              -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
            rm -f keystore.jks
          else
            ./gradlew assembleDebug
          fi

      - name: Locate APK
        id: apk
        run: |
          APK=$(find sheaf/app/build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $APK)" >> "$GITHUB_OUTPUT"

      - name: Update dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build
          prerelease: true
          make_latest: false
          body: |
            Automated development build from commit ${{ github.sha }}.

            Built from branch `${{ github.ref_name }}` on ${{ github.run_id }}.
          files: ${{ steps.apk.outputs.path }}