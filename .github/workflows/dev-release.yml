name: Dev Release

on:
  push:
    branches: [main, master]

permissions:
  contents: write
  id-token: write  # sigstore/cosign keyless OIDC signing

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper JAR
        working-directory: sheaf
        run: gradle wrapper

      - name: Make gradlew executable
        run: chmod +x sheaf/gradlew

      - name: Run unit tests
        working-directory: sheaf
        run: ./gradlew :app:test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            sheaf/app/build/reports/tests/
            sheaf/app/build/test-results/
          if-no-files-found: ignore

      - name: Build release APK
        working-directory: sheaf
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
            ./gradlew :app:assembleRelease :wear:assembleRelease \
              -Pandroid.injected.signing.store.file="$PWD/keystore.jks" \
              -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
            rm -f keystore.jks
          else
            ./gradlew :app:assembleDebug :wear:assembleDebug
          fi

      - name: Locate APKs
        id: apk
        run: |
          APP_APK=$(find sheaf/app/build/outputs/apk -name "*.apk" | head -1)
          WEAR_APK=$(find sheaf/wear/build/outputs/apk -name "*.apk" 2>/dev/null | head -1)
          echo "app_path=$APP_APK" >> "$GITHUB_OUTPUT"
          echo "wear_path=$WEAR_APK" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Sign each APK with cosign keyless OIDC. The .sig + .pem are uploaded
      # alongside the APK so verifiers can run `cosign verify-blob` without
      # needing any access to the GH workflow token. SBOM attestation is
      # tracked as a follow-up; see docs/VERIFYING.md.
      - name: Sign APKs with cosign
        id: sign
        env:
          APP_APK: ${{ steps.apk.outputs.app_path }}
          WEAR_APK: ${{ steps.apk.outputs.wear_path }}
        run: |
          set -euo pipefail
          ARTEFACTS=()
          sign_blob() {
            local path="$1"
            [ -n "$path" ] && [ -f "$path" ] || return 0
            cosign sign-blob --yes \
              --output-signature "$path.sig" \
              --output-certificate "$path.pem" \
              "$path"
            ARTEFACTS+=("$path.sig" "$path.pem")
            echo "Signed $(basename "$path")"
          }
          sign_blob "$APP_APK"
          sign_blob "$WEAR_APK"
          {
            echo 'extra_files<<EOF'
            if [ "${#ARTEFACTS[@]}" -gt 0 ]; then
              printf '%s\n' "${ARTEFACTS[@]}"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Delete existing dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete dev --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true

      - name: Publish dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build
          prerelease: true
          make_latest: false
          body: |
            Automated development build from commit ${{ github.sha }}.

            Built from branch `${{ github.ref_name }}` on ${{ github.run_id }}.

            APKs are cosign-signed via keyless OIDC; verification instructions
            are in [`docs/VERIFYING.md`](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/docs/VERIFYING.md).
          files: |
            ${{ steps.apk.outputs.app_path }}
            ${{ steps.apk.outputs.wear_path }}
            ${{ steps.sign.outputs.extra_files }}